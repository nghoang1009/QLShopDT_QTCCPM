name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # =====================
  # STAGE 1: LINT
  # =====================
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP Syntax Check
        run: |
          find ./QLShopDT_API -name "*.php" -exec php -l {} \;
          echo "✅ PHP syntax check passed"

  # =====================
  # STAGE 2: BUILD & TEST
  # =====================
  build-and-test:
    name: Build Docker & Run Playwright Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      # Build và khởi động Docker containers
      - name: Build and start containers
        run: |
          sed -i 's/8080:80/80:80/' docker-compose.yml
          docker compose up -d --build

      # Chờ MySQL sẵn sàng (tránh import DB quá sớm)
      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL..."
          DB_CONTAINER=$(docker compose ps -q db)
          for i in $(seq 1 60); do
            if docker exec $DB_CONTAINER mysql -u root -prootpass -e "SELECT 1;" 2>/dev/null; then
              echo "✅ MySQL is ready"
              break
            fi
            echo "Attempt $i/60..."
            sleep 3
          done

      - name: Import database
        run: |
          DB_CONTAINER=$(docker compose ps -q db)
          docker exec $DB_CONTAINER mysql -u root -prootpass -e "CREATE DATABASE IF NOT EXISTS qlshopdienthoai CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          docker exec -i $DB_CONTAINER mysql -u root -prootpass qlshopdienthoai < qlshopdienthoai.sql
          echo "✅ Database imported"

      - name: Health check
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/QLShopDT_API/app.php)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "✅ App is up (HTTP $STATUS)"
              break
            fi
            echo "Attempt $i/20 - HTTP $STATUS..."
            sleep 3
          done

      # Cài Node + dependencies
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Debug - Find files
        run: |
          APP_CONTAINER=$(docker compose ps -q app)
          docker exec $APP_CONTAINER ls /var/www/html/QLShopDT_API/
          docker exec $APP_CONTAINER ls /var/www/html/QLShopDT_API/config/
        continue-on-error: true

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Debug - Check app response
        run: |
          curl -s http://localhost/QLShopDT_API/app.php | grep -i "đăng nhập\|login\|error\|warning" | head -20  

      - name: Debug - Check PHP error log
        run: |
          APP_CONTAINER=$(docker compose ps -q app)
          docker exec $APP_CONTAINER bash -c "tail -30 /var/log/apache2/error.log 2>/dev/null || echo 'No log'"
          docker exec $APP_CONTAINER bash -c "cat /var/www/html/QLShopDT_API/config/config.php | grep DB_HOST"
        continue-on-error: true

      - name: Debug - Check Apache config
        run: |
          APP_CONTAINER=$(docker compose ps -q app)
          docker exec $APP_CONTAINER bash -c "curl -s http://localhost/QLShopDT_API/app.php 2>&1 | head -50"
        continue-on-error: true

      # Chạy toàn bộ bộ test Playwright
      - name: Run Playwright tests
        run: npx playwright test --workers=1
        env:
          CI: true
          BASE_URL: http://localhost:8080

      # Upload báo cáo test (luôn upload dù pass hay fail)
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # Dọn dẹp container sau khi test xong
      - name: Stop containers
        if: always()
        run: docker compose down

  # =====================
  # STAGE 3: DEPLOY
  # =====================
  deploy:
    name: Deploy (Build Production Image)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build production Docker image
        run: |
          docker build -t qlshopdt-api:latest .
          echo "✅ Production image built successfully"

      - name: Show image info
        run: docker images qlshopdt-api