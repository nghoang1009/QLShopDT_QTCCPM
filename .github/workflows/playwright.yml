name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: PHP Syntax Check
        run: |
          find ./QLShopDT_API -name "*.php" -exec php -l {} \;
          echo "✅ PHP syntax check passed"

  build-and-test:
    name: Build Docker & Run Playwright Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Configure ports for CI
        run: |
          sed -i 's/8080:80/80:80/' docker-compose.yml

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL..."
          DB_CONTAINER=$(docker compose ps -q db)

          for i in $(seq 1 60); do
            if docker exec $DB_CONTAINER mysql -u root -prootpass -e "SELECT 1;" 2>/dev/null; then
              echo "✅ MySQL is ready after $i attempts"
              break
            fi

            echo "Attempt $i/60..."
            sleep 3
          done

      - name: Import database
        run: |
          DB_CONTAINER=$(docker compose ps -q db)
          docker exec $DB_CONTAINER mysql -u root -prootpass -e "CREATE DATABASE IF NOT EXISTS qlshopdienthoai CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          docker exec -i $DB_CONTAINER mysql -u root -prootpass qlshopdienthoai < QLShopDT_API/qlshopdienthoai.sql
          echo "✅ Database imported"

      - name: Verify database import
        run: |
          DB_CONTAINER=$(docker compose ps -q db)
          echo "=== Tables ==="
          docker exec $DB_CONTAINER mysql -u root -prootpass qlshopdienthoai -e "SHOW TABLES;"
          echo "=== Admin account ==="
          docker exec $DB_CONTAINER mysql -u root -prootpass qlshopdienthoai -e "SELECT * FROM taikhoan WHERE tentk='admin';"

      - name: Debug - Test login via curl
        run: |
          curl -v -c /tmp/cookies.txt -b /tmp/cookies.txt \
            -d "tentk=admin&mk=123" \
            http://localhost/QLShopDT_API/app.php?action=login \
            2>&1 | grep -E "Location|HTTP/|Set-Cookie" | head -20
        continue-on-error: true

      - name: Health check
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/QLShopDT_API/app.php)

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "✅ App is up (HTTP $STATUS)"
              break
            fi

            echo "Attempt $i/20 - HTTP $STATUS..."
            sleep 3
          done

      - name: Debug - Check page content
        run: |
          curl -s http://localhost/QLShopDT_API/app.php | head -50
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: QLShopDT_API/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('QLShopDT_API/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Node dependencies
        working-directory: QLShopDT_API
        run: npm ci

      - name: Install Playwright browsers
        working-directory: QLShopDT_API
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: QLShopDT_API
        run: npx playwright test --workers=1 --retries=0 --project=auth --project=chromium
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: QLShopDT_API/playwright-report/
          retention-days: 30

      - name: Stop containers
        if: always()
        run: docker compose down

  deploy:
    name: Deploy (Build Production Image)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build production Docker image
        run: |
          docker build -t qlshopdt-api:latest .
          echo "✅ Production image built successfully"

      - name: Show image info
        run: docker images qlshopdt-api